<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>浙江艺考升学快测</title>
    <meta name="description" content="浙江艺考家庭快速查看综合分定位、位次和院校层次。">
    <link rel="icon" href="./assets/feifan-logo.jpg">
    <link rel="stylesheet" href="./styles.css">
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:8790/simple.html");
      }
    </script>
  </head>
  <body class="simple-page">
    <main class="simple-shell">
      <header class="simple-header">
        <a class="simple-brand" href="./simple.html">
          <img src="./assets/feifan-logo.jpg" alt="非凡教育标志">
          <span>
            <em>非凡教育</em>
            <strong>浙江艺考升学快测</strong>
          </span>
        </a>
        <a class="simple-link" href="./index.html">完整版白皮书</a>
      </header>

      <section class="simple-intake">
        <aside class="simple-intro-panel">
          <section class="simple-hero">
            <p>浙江艺考家庭快测</p>
            <h1>输入关键成绩，看清升学层次</h1>
            <span>用分数、阶段和家庭边界，生成一份清晰易读的升学初筛报告。</span>
          </section>

          <div class="simple-brief-list">
            <article>
              <strong>分数定位</strong>
              <span>先判断当前综合分和目标差距。</span>
            </article>
            <article>
              <strong>院校梯度</strong>
              <span>生成冲、稳、保代表样本。</span>
            </article>
            <article>
              <strong>后续重点</strong>
              <span>明确下一步需要补充确认的信息。</span>
            </article>
          </div>
        </aside>

        <section class="simple-workspace">
        <form id="simple-form" class="simple-card simple-form-card">
          <div class="simple-form-head">
            <strong>快速填写</strong>
            <span>约 30 秒完成</span>
          </div>

          <label class="simple-field simple-field-full">
            学生姓名
            <input name="studentName" type="text" maxlength="20" autocomplete="name" placeholder="请输入孩子姓名" required>
          </label>

          <label class="simple-field simple-field-full">
            艺考类别
            <select name="artCategory">
              <option>美术与设计</option>
              <option>播音</option>
              <option>舞蹈</option>
              <option>书法</option>
              <option>表导</option>
              <option>音乐</option>
            </select>
          </label>

          <label class="simple-field">
            文化总分
            <input name="cultureTotal" type="number" min="0" max="750" inputmode="decimal" required>
          </label>

          <label class="simple-field">
            专业成绩
            <input name="professionalScore" type="number" min="0" max="300" inputmode="decimal" required>
          </label>

          <div class="simple-form-section">
            <strong>辅助判断</strong>
            <span>选一下即可，报告会更像规划而不是算分。</span>
          </div>

          <label class="simple-field">
            当前阶段
            <select name="studentStage">
              <option>高三下学期</option>
              <option>高三上学期</option>
              <option>高二提前规划</option>
              <option>考后估分</option>
              <option>复读/再规划</option>
            </select>
          </label>

          <label class="simple-field">
            成绩来源
            <select name="scoreSource">
              <option>最近一次模考</option>
              <option>校内月考</option>
              <option>统考后估分</option>
              <option>正式成绩</option>
              <option>家长预估</option>
            </select>
          </label>

          <label class="simple-field">
            升学目标
            <select name="planningGoal">
              <option>先保本科</option>
              <option>冲公办本科</option>
              <option>冲省重点/强专业</option>
              <option>暂无明确目标</option>
            </select>
          </label>

          <label class="simple-field">
            家庭边界
            <select name="familyBoundary">
              <option>暂不确定</option>
              <option>省内优先</option>
              <option>省外也可看</option>
              <option>公办优先</option>
              <option>中外合作可沟通</option>
            </select>
          </label>

          <div class="simple-generation" id="simple-generation" role="status" aria-live="polite" hidden>
            <strong>正在生成快测报告</strong>
            <span id="simple-countdown">预计还需 30 秒</span>
            <div><i id="simple-progress"></i></div>
          </div>

          <button type="submit" class="simple-primary">生成快测报告</button>
          <p class="simple-error" id="simple-error" role="alert" hidden></p>
          </form>

          <section id="simple-report" class="simple-report" aria-live="polite" hidden></section>
        </section>
      </section>
    </main>

    <script src="./config.js"></script>
    <script type="module" src="./src/simple-app.mjs"></script>
  </body>
</html>
